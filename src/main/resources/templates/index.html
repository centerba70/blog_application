<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog app</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script type="text/javascript" th:src="@{/js/script.js}" defer></script>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <script th:src="@{/js/jquery-4.0.0.min.js}" type="text/javascript"></script>
</head>
<body onload="showAllPosts()">
    <h1>Blog Application</h1>
    <div id="divHello"></div>
    <tr th:text="${name} ?: ${name}"> </tr>
    <p th:text="${message}"></p>
    <a href="#create_new_post">Create new Post</a>
    <div class="js" id="create_new_post">
        <form class="js" id="create_new_post_form" action="javascript:sendPost()">
            <label for="username">Username:</label><br>
            <input type="text" id="username" name="username"><br>

            <label for="title">Post Title:</label><br>
            <input type="text" id="title" name="title">

            <label for="postContent">Content:</label><br>
            <input type="text" id="postContent" name="postContent">
            <input type="submit" value="Create Post">
        </form>
    </div>
    <input [value]="searchTerm()" (input)="searchTerm.set($event.target.value)" />
    <ul>
        @for (item of filteredItems(); track $index) {
        <li>{{ item }}</li>
        }
    </ul>
    <div class="container" id="posts-container">
        <!-- Show all posts -->
    </div>

    <ol>
        <li></li>
        <li></li>
        <li></li>
        <li class="other"></li>
    </ol>
</body>
</html>
<script type="text/javascript">
    $(document).ready(function() {
        $("#divHello").append("<p> Hi User!! </p>").append("Current datetime is: " + new Date())
        $("li").text("add this repeating text")
        $(".other").html("Show class selector")
    })

</script>
